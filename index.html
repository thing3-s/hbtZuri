<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy birthday to you, Zuri. </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <p> [此网页永远祝贺2026-4-25] </p >

    <div id="particle-container"></div>
    
    <audio id="bgMusic" src="music.mp3" loop></audio>

        <div class="cd-disc"></div>
    </div>
    
    <div class="music-notes" id="musicNotes">

            <h1 class="main-title">🎂亲爱的ZURI，生日快乐🎂</h1>

        </div>
    </section>

    <section class="gallery-section">

	   </div>

	   </div>

    		<img src="photo6.jpg">
	   </div>
	   <div class="photo-card">
    		<img src="photo7.jpg">
	   </div>
	   <div class="photo-card">
    		<img src="photo8.jpg">
	   </div>
	   <div class="photo-card">
    		<img src="photo9.jpg">
	   </div>
        </div>
    </section>

        <p>Made by [你的成成]</p >
